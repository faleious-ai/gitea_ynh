name: Update stable upstream release

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:
  push:
    paths:
      - manifest.toml
      - tools/update_upstream.py
      - tools/validate_package.py
      - .github/workflows/upstream-update.yml

permissions:
  contents: write

concurrency:
  group: upstream-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"
      - uses: sigstore/cosign-installer@v4.1.2
      - name: Resolve and verify newest stable release
        run: python3 tools/update_upstream.py
      - name: Validate generated package state
        run: |
          set -euo pipefail
          python3 tools/validate_package.py
          python3 -m py_compile tools/*.py
          find scripts -maxdepth 1 -type f ! -name '*.sql' -print0 |
            sort -z |
            while IFS= read -r -d '' script; do
              echo "Checking ${script}"
              bash -n "$script"
            done
      - name: Run official YunoHost package linter
        run: |
          set -euo pipefail
          linter_dir="$RUNNER_TEMP/package_linter"
          git clone --depth 1 https://github.com/YunoHost/package_linter.git "$linter_dir"
          python3 -m venv "$linter_dir/venv"
          "$linter_dir/venv/bin/python" -m pip install --requirement "$linter_dir/requirements.txt"
          "$linter_dir/venv/bin/python" "$linter_dir/package_linter.py" .
      - name: Commit immutable release pins
        run: |
          if git diff --quiet; then
            echo "No stable update available"
            exit 0
          fi
          git config user.name "gitea-ynh-updater"
          git config user.email "gitea-ynh-updater@users.noreply.github.com"
          git add manifest.toml
          version=$(python3 -c 'import tomllib; print(tomllib.load(open("manifest.toml","rb"))["version"])')
          git commit -m "Update Gitea to ${version}"
          git push origin HEAD:master
