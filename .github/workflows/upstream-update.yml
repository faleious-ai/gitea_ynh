name: Update stable upstream release

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:
  push:
    paths:
      - manifest.toml
      - tools/update_upstream.py
      - tools/validate_package.py
      - .github/workflows/upstream-update.yml

permissions:
  contents: write

concurrency:
  group: upstream-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: sigstore/cosign-installer@v3
      - name: Resolve and verify newest stable release
        run: python3 tools/update_upstream.py
      - name: Validate generated package state
        run: |
          python3 tools/validate_package.py
          python3 -m py_compile tools/*.py
          for script in scripts/*; do bash -n "$script"; done
      - name: Commit immutable release pins
        run: |
          if git diff --quiet; then
            echo "No stable update available"
            exit 0
          fi
          git config user.name "gitea-ynh-updater"
          git config user.email "gitea-ynh-updater@users.noreply.github.com"
          git add manifest.toml
          version=$(python3 -c 'import tomllib; print(tomllib.load(open("manifest.toml","rb"))["version"])')
          git commit -m "Update Gitea to ${version}"
          git push origin HEAD:master
